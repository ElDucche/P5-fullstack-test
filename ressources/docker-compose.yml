version: '3.8'
services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 'password'
      MYSQL_DATABASE: 'yoga_studio'
    ports:
      - "3306:3306"
    volumes:
      - ./sql/script.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
