# Configuration de test pour désactiver certains composants automatiques
# Désactive l'auto-configuration des mappers MapStruct pour éviter les conflits
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.web.servlet.WebMvcAutoConfiguration

# Configuration de base de données de test
spring.datasource.url=jdbc:h2:mem:testdb
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Logging pour les tests
logging.level.com.openclassrooms.starterjwt=DEBUG
logging.level.org.springframework.context=WARN
